name: Newsletter Trigger

on:
  schedule:
    - cron: '5 21 * * *'   # KST 06:05 (newsletter.yml과 1분 차이)

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger newsletter workflow
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/newsletter.yml/dispatches \
            -d '{"ref":"main"}'
